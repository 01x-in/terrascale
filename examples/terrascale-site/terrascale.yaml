version: "1"
project:
    name: terrascale
    terraform_dir: .
    mode: root
state:
    backend: local
tenant_spec:
    tenant_variables:
        - name: subdomain
          type: string
          required: false
          prompt: Subdomain prefix. Use an empty string for the apex domain.
        - name: environment
          type: string
          required: false
          default: production
          prompt: Environment name for tagging and naming.
    shared_variables:
        - project_name
        - domain_name
        - hosted_zone_name
        - aws_region
        - tags
tenants:
    - slug: production
      name: TerraScale Site
      environment: production
      status: active
      created_at: 2026-03-09T11:28:10.862931Z
      updated_at: 2026-03-09T11:34:03.174044Z
      variables:
        aws_region: us-east-2
        domain_name: terrascale.link
        environment: production
        hosted_zone_name: terrascale.link
        project_name: terrascale
        subdomain: ""
      state_path: .terrascale/state/production/
      account_mode: same
