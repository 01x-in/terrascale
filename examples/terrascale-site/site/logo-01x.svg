<svg viewBox="0 0 220 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="01X Logo">
    <!-- 0 (Circle) -->
    <circle cx="50" cy="50" r="30" fill="#d7ff00" />

    <!-- 1 (Bar) -->
    <rect x="100" y="20" width="20" height="60" rx="6" fill="#d7ff00" />

    <!-- X (Crossed Bars) -->
    <g transform="translate(175, 50) scale(1.15)">
        <rect x="-10" y="-30" width="20" height="60" rx="6" transform="rotate(45)" fill="#d7ff00" />
        <rect x="-10" y="-30" width="20" height="60" rx="6" transform="rotate(-45)" fill="#d7ff00" />
    </g>
</svg>
