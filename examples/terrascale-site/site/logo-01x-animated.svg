<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="01X Animated Logo">
  <style>
    .shape {
      transform-origin: 50px 50px;
      fill: #d7ff00;
    }
    .circle {
      animation: circleAnim 3s infinite;
    }
    .x-rotate {
      transform-origin: 50px 50px;
      animation: xRotateAnim 3s infinite;
    }
    .x-opacity {
      animation: xOpacityAnim 3s infinite;
    }
    .bar-b {
      transform-origin: 50px 50px;
      animation: barBAnim 3s infinite;
    }

    @keyframes circleAnim {
      0% { x: 20px; width: 60px; rx: 30px; transform: rotate(0deg); opacity: 1; animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
      16.667% { x: 40px; width: 20px; rx: 6px; transform: rotate(0deg); opacity: 1; }
      23.333% { x: 40px; width: 20px; rx: 6px; transform: rotate(0deg); opacity: 1; animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
      33.333% { x: 40px; width: 20px; rx: 6px; transform: rotate(45deg); opacity: 1; }
      33.334% { opacity: 0; }
      74.999% { x: 40px; width: 20px; rx: 6px; transform: rotate(45deg); opacity: 0; animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
      75.000% { x: 40px; width: 20px; rx: 6px; transform: rotate(45deg); opacity: 0; animation-timing-function: cubic-bezier(0.45, 0, 0.55, 1); }
      81.667% { x: 20px; width: 60px; rx: 30px; transform: rotate(0deg); opacity: 1; }
      100% { x: 20px; width: 60px; rx: 30px; transform: rotate(0deg); opacity: 1; }
    }

    @keyframes xRotateAnim {
      0%, 50.000% { transform: rotate(45deg); animation-timing-function: cubic-bezier(0.55, 0.085, 0.68, 0.53); }
      63.333% { transform: rotate(225deg); animation-timing-function: linear; }
      73.333% { transform: rotate(765deg); animation-timing-function: cubic-bezier(0.5, 0, 1, 1); }
      80.000% { transform: rotate(1845deg); }
      82.000%, 100% { transform: rotate(45deg); }
    }

    @keyframes xOpacityAnim {
      0%, 33.333% { opacity: 0; }
      33.334%, 75.000% { opacity: 1; }
      80.000%, 100% { opacity: 0; }
    }

    @keyframes barBAnim {
      0%, 33.333% { transform: rotate(0deg); animation-timing-function: cubic-bezier(0, 0, 0.2, 1); }
      43.333%, 85.000% { transform: rotate(90deg); }
      86.000%, 100% { transform: rotate(0deg); }
    }
  </style>

  <rect class="shape circle" y="20" height="60" />
  <g class="x-opacity">
    <g class="x-rotate">
      <rect class="shape bar-a" x="40" y="20" width="20" height="60" rx="6" />
      <rect class="shape bar-b" x="40" y="20" width="20" height="60" rx="6" />
    </g>
  </g>
</svg>
